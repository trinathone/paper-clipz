<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Paper Clipz — Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:             #f4f4f5;
      --surface:        #ffffff;
      --surface-2:      #fafafa;
      --border:         #e4e4e7;
      --border-light:   #f0f0f0;
      --border-accent:  #d1d1d1;
      --text:           #18181b;
      --text-2:         #52525b;
      --text-muted:     #71717a;
      --text-dim:       #a1a1aa;
      --card-text-bg:   #f8f8f8;
      --input-bg:       #f9f9f9;
      --hover-bg:       #f4f4f5;
      --note-bg:        #fefce8;
      --scrollbar:      #d4d4d8;
      --shadow-card:    rgba(0,0,0,0.06);
      --del-hover-bg:   #fff1f2;
      --card-rgb:       255, 255, 255;
      --card-op:        1;
    }

    body.dark {
      --bg:             #09090b;
      --surface:        #18181b;
      --surface-2:      #1f1f23;
      --border:         #27272a;
      --border-light:   #232326;
      --border-accent:  #3f3f46;
      --text:           #fafafa;
      --text-2:         #a1a1aa;
      --text-muted:     #71717a;
      --text-dim:       #52525b;
      --card-text-bg:   #1f1f23;
      --input-bg:       #1f1f23;
      --hover-bg:       #27272a;
      --note-bg:        #1c1a0e;
      --scrollbar:      #3f3f46;
      --shadow-card:    rgba(0,0,0,0.35);
      --del-hover-bg:   rgba(239,68,68,0.1);
      --card-rgb:       24, 24, 27;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      min-height: 100vh;
      transition: background 0.2s, color 0.2s;
    }

    /* ── Top bar ── */
    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .logo {
      font-weight: 700;
      font-size: 15px;
      letter-spacing: -0.4px;
      white-space: nowrap;
      color: var(--text);
    }

    .search-wrap { flex: 1; max-width: 440px; }

    .search-input {
      width: 100%;
      padding: 8px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      font-family: inherit;
      outline: none;
      background: var(--input-bg);
      color: var(--text);
      transition: border-color 0.12s, background 0.12s;
    }
    .search-input:focus { border-color: var(--text); background: var(--surface); }
    .search-input::placeholder { color: var(--text-dim); }

    .count { font-size: 12px; color: var(--text-dim); white-space: nowrap; }

    /* ── Font size + theme buttons ── */
    .topbar-right {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: auto;
    }

    .size-group {
      display: flex;
      align-items: center;
      border: 1px solid var(--border);
      border-radius: 7px;
      overflow: hidden;
    }

    .sz-btn {
      background: var(--surface);
      border: none;
      border-right: 1px solid var(--border);
      cursor: pointer;
      color: var(--text-muted);
      padding: 5px 9px;
      line-height: 1;
      transition: background 0.1s, color 0.1s;
      font-family: inherit;
    }
    .sz-btn:last-child { border-right: none; }
    .sz-btn:nth-child(1) { font-size: 11px; }
    .sz-btn:nth-child(2) { font-size: 14px; }
    .sz-btn:nth-child(3) { font-size: 17px; }
    .sz-btn:hover { background: var(--hover-bg); color: var(--text); }
    .sz-btn.active { background: var(--text); color: var(--surface); }

    .theme-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 7px;
      cursor: pointer;
      color: var(--text-muted);
      padding: 6px 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.12s;
    }
    .theme-btn:hover { border-color: var(--text); color: var(--text); background: var(--hover-bg); }

    /* ── Card transparency slider ── */
    .op-group {
      display: flex;
      align-items: center;
      gap: 6px;
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 4px 10px;
      background: var(--surface);
    }

    .op-icon {
      font-size: 12px;
      color: var(--text-muted);
      line-height: 1;
      flex-shrink: 0;
    }

    .op-slider {
      width: 68px;
      height: 3px;
      -webkit-appearance: none;
      appearance: none;
      background: var(--border);
      border-radius: 3px;
      outline: none;
      cursor: pointer;
    }
    .op-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--text);
      cursor: pointer;
      transition: transform 0.1s;
    }
    .op-slider::-webkit-slider-thumb:hover { transform: scale(1.2); }

    /* ── Filters ── */
    .filters {
      padding: 12px 24px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      background: var(--surface);
      border-bottom: 1px solid var(--border-light);
    }

    .chip {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-2);
      white-space: nowrap;
      transition: all 0.12s;
      font-family: inherit;
    }
    .chip:hover { border-color: var(--text); color: var(--text); }
    .chip.active { background: var(--text); color: var(--surface); border-color: var(--text); }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 14px;
      padding: 20px 24px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .empty-state {
      grid-column: 1 / -1;
      text-align: center;
      padding: 64px 20px;
      color: var(--text-dim);
      font-size: 14px;
      line-height: 2.2;
    }

    /* ── Card ── */
    .card {
      background: rgba(var(--card-rgb), var(--card-op));
      border-radius: 10px;
      border: 1px solid var(--border);
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      transition: box-shadow 0.15s;
    }
    .card:hover { box-shadow: 0 2px 14px var(--shadow-card); }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .card-domain {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .card-time { font-size: 11px; color: var(--text-dim); white-space: nowrap; flex-shrink: 0; }

    .card-title {
      font-weight: 600;
      font-size: 13px;
      line-height: 1.4;
      color: var(--text);
      text-decoration: none;
      display: block;
    }
    .card-title:hover { text-decoration: underline; }

    /* ── Scrollable text ── */
    .card-text-wrap {
      border: 1px solid var(--border);
      border-radius: 7px;
      overflow: hidden;
    }

    .card-text {
      max-height: 90px;
      overflow-y: auto;
      padding: 8px 10px;
      background: var(--card-text-bg);
      border-left: 3px solid var(--border-accent);
      font-size: var(--txt-size, 13px);
      color: var(--text-2);
      line-height: 1.65;
      scroll-behavior: smooth;
      white-space: pre-wrap;
      word-break: break-word;
      transition: max-height 0.22s ease;
    }

    .card-text::-webkit-scrollbar { width: 4px; }
    .card-text::-webkit-scrollbar-track { background: transparent; }
    .card-text::-webkit-scrollbar-thumb { background: var(--scrollbar); border-radius: 4px; }

    .card-text.expanded { max-height: 420px; }

    /* ── Expand button ── */
    .expand-btn {
      width: 100%;
      padding: 5px 0;
      background: none;
      border: none;
      border-top: 1px solid var(--border);
      cursor: pointer;
      color: var(--text-dim);
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      transition: background 0.12s, color 0.12s;
      font-family: inherit;
    }
    .expand-btn:hover { background: var(--hover-bg); color: var(--text-2); }

    /* ── Note ── */
    .card-note {
      font-size: 12px;
      color: var(--text-muted);
      font-style: italic;
      line-height: 1.5;
      padding: 6px 8px;
      background: var(--note-bg);
      border-radius: 6px;
    }

    /* ── Footer ── */
    .card-footer {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 4px;
    }

    .copy-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-muted);
      cursor: pointer;
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 5px;
      font-family: inherit;
      transition: all 0.12s;
    }
    .copy-btn:hover { border-color: var(--text); color: var(--text); }
    .copy-btn.done { border-color: #16a34a; color: #16a34a; }

    .del-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-dim);
      cursor: pointer;
      font-size: 15px;
      padding: 2px 7px;
      border-radius: 5px;
      line-height: 1.3;
      transition: all 0.12s;
    }
    .del-btn:hover { border-color: #ef4444; color: #ef4444; background: var(--del-hover-bg); }
  </style>
</head>
<body>
  <div class="topbar">
    <span class="logo">📎 Paper Clipz</span>
    <div class="search-wrap">
      <input class="search-input" id="searchInput" placeholder="Search clips..." type="text" autofocus>
    </div>
    <span class="count" id="count"></span>
    <div class="topbar-right">
      <div class="size-group" title="Text size">
        <button class="sz-btn" data-sz="11">A</button>
        <button class="sz-btn active" data-sz="13">A</button>
        <button class="sz-btn" data-sz="16">A</button>
      </div>
      <button class="theme-btn" id="sortBtn" title="Toggle sort order"></button>
      <button class="theme-btn" id="exportBtn" title="Export clips as JSON">↓ Export</button>
      <button class="theme-btn" id="importBtn" title="Import clips from JSON">↑ Import</button>
      <input type="file" id="importFile" accept=".json" style="display:none">
      <button class="theme-btn" id="themeBtn" title="Toggle dark mode"></button>
      <div class="op-group" title="Card transparency">
        <span class="op-icon">◑</span>
        <input type="range" class="op-slider" id="opSlider" min="15" max="100" value="100" step="1">
      </div>
    </div>
  </div>

  <div class="filters" id="filters"></div>
  <div class="grid" id="grid"></div>

  <script src="dashboard.js"></script>
</body>
</html>
