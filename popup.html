<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Paper Clipz</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: transparent !important;
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    /* True glass — backdrop-filter blurs the page content behind the popup */
    .wrap {
      background: rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(40px) saturate(180%);
      -webkit-backdrop-filter: blur(40px) saturate(180%);
      border-radius: 14px;
      border: 1px solid rgba(255, 255, 255, 0.35);
      box-shadow:
        0 8px 32px rgba(0, 0, 0, 0.18),
        inset 0 1px 0 rgba(255, 255, 255, 0.5);
      overflow: hidden;
      color: #1a1a1a;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 11px 13px;
      background: rgba(255, 255, 255, 0.22);
      border-bottom: 1px solid rgba(255, 255, 255, 0.25);
    }

    .logo {
      font-weight: 700;
      font-size: 13px;
      letter-spacing: -0.3px;
      color: #111;
    }

    .dash-btn {
      background: rgba(0, 0, 0, 0.06);
      border: none;
      font-size: 11px;
      color: #555;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      font-family: inherit;
      transition: background 0.12s;
    }
    .dash-btn:hover { background: rgba(0,0,0,0.12); color: #111; }

    /* ── Form ── */
    .form {
      padding: 13px 13px 15px;
      display: flex;
      flex-direction: column;
      gap: 9px;
    }

    .field { display: flex; flex-direction: column; gap: 4px; }

    .field label {
      font-size: 10px;
      font-weight: 600;
      color: rgba(0, 0, 0, 0.45);
      letter-spacing: 0.6px;
      text-transform: uppercase;
    }

    .field input,
    .field textarea {
      width: 100%;
      padding: 7px 10px;
      border: 1px solid rgba(0, 0, 0, 0.1);
      border-radius: 8px;
      font-size: 12px;
      font-family: inherit;
      outline: none;
      background: rgba(255, 255, 255, 0.62);
      color: #1a1a1a;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      transition: background 0.12s, border-color 0.12s;
    }
    .field input:focus,
    .field textarea:focus {
      background: rgba(255, 255, 255, 0.85);
      border-color: rgba(0, 0, 0, 0.28);
    }
    .field input::placeholder,
    .field textarea::placeholder { color: rgba(0,0,0,0.28); }

    .field textarea {
      resize: none;
      height: 78px;
      line-height: 1.55;
    }

    /* URL field with open button */
    .url-row { position: relative; }
    .url-row input { padding-right: 30px; }
    .url-open {
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: rgba(0,0,0,0.3);
      font-size: 13px;
      line-height: 1;
      padding: 2px;
      transition: color 0.12s;
    }
    .url-open:hover { color: #111; }

    .save-btn {
      width: 100%;
      padding: 9px;
      background: rgba(26, 26, 26, 0.88);
      color: #fff;
      border: none;
      border-radius: 9px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      backdrop-filter: blur(8px);
      transition: background 0.15s, transform 0.1s;
      margin-top: 2px;
    }
    .save-btn:hover { background: rgba(26,26,26,0.95); }
    .save-btn:active { transform: scale(0.98); }
    .save-btn.saved {
      background: rgba(22, 163, 74, 0.88);
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="header">
      <span class="logo">📎 Paper Clipz <span id="clipCount" style="font-size:10px;opacity:0.5;font-weight:400;"></span></span>
      <button class="dash-btn" id="dashBtn">Dashboard →</button>
    </div>

    <div class="form">
      <div class="field">
        <label for="titleInput">Title</label>
        <input type="text" id="titleInput" placeholder="Page title...">
      </div>

      <div class="field">
        <label for="urlInput">Link</label>
        <div class="url-row">
          <input type="text" id="urlInput" placeholder="https://...">
          <button class="url-open" id="urlOpen" title="Open link">↗</button>
        </div>
      </div>

      <div class="field">
        <label for="textInput">Text</label>
        <textarea id="textInput" placeholder="Paste or type content..."></textarea>
      </div>

      <button class="save-btn" id="saveBtn">Save Clip</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
